              description: JSON array that contains a list of the JWE encryption algorithms (enc values) supported for the ID token to encode the claims in a JWT
              type: array
              items:
                $ref: '#/components/schemas/ContentEncryptionAlgorithm'
              x-okta-lifecycle:
                features:
                  - OIDC_TOKEN_ENCRYPTION
