              type: array
              items:
                $ref: '#/components/schemas/SigningAlgorithm'
            id_token_encryption_alg_values_supported:
              description: JSON array that contains a list of the JWE encryption algorithms (alg values) supported for the ID token to encode the claims in a JWT
